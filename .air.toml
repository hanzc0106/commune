root = "apps/api"
tmp_dir = "../../tmp/air"

[build]
cmd = "go build -o ../../tmp/air/commune-api.exe ./cmd/server"
bin = "../../tmp/air/commune-api.exe"
include_ext = ["go", "sql"]
exclude_dir = ["tmp", "vendor", "internal/db/queries"]
delay = 1000
stop_on_error = true

[log]
time = true

[screen]
clear_on_rebuild = false
